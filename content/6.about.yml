  title: About Rahul Dhole | Full-Stack Engineer in Paris
  description: Learn about Rahul Dhole, a Full-Stack Engineer based in Paris specializing in Ruby on Rails, Vue.js, and Cloud DevOps. Discover his engineering philosophy and journey.
